name: Update Daily Poem

on:
  workflow_dispatch:
  schedule:
    # UTC 00:00, 北京时间 08:00
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-poem:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update daily poem
        run: python scripts/update_poem.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily poem"
          file_pattern: README.md
